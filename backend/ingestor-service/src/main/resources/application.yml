spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
        security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
        sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}

reddit:
  client-id: ${CLIENT_ID}
  client-secret: ${CLIENT_SECRET}
  username: ${REDDIT_USERNAME}
  password: ${REDDIT_PASSWORD}
  user-agent: sentrix-ingestor/0.1 by ${REDDIT_USERNAME}
  token-url: https://www.reddit.com/api/v1/access_token
  base-oauth-url: https://oauth.reddit.com
  search-time-filter: ${REDDIT_SEARCH_TIME_FILTER:week}
  search-limit: ${REDDIT_SEARCH_LIMIT:50}
  search-sort: ${REDDIT_SEARCH_SORT:new}

app:
  kafka:
    topic: ${KAFKA_TOPIC:sentrix.ingestor.events}

ingestion:
  scheduler:
    cron: ${INGESTION_SCHEDULER_CRON:0 0 * * * *}
    zone: ${INGESTION_SCHEDULER_ZONE:UTC}

logging:
  level:
    com.sentrix.ingestor_service.service.KafkaEventPublisher: INFO
    com.sentrix.ingestor_service.adapter.reddit: INFO

server:
  port: ${PORT:8080}
