spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
    consumer:
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  kafka:
    topic:
      raw: sentrix.ingestor.events
      cleaned: sentrix.filter-service-a.cleaned
      dropped: sentrix.filter-service-a.dropped
    consumer:
      group-id: filter-service-a
  text:
    max-len: 8000
  validation:
    min-text-len: 10
    max-event-age-days: 7
    drop-on-truncate: false  # if true, events exceeding max-text-len are dropped; if false, they are truncated
  dedup:
    enabled: true
    ttl-seconds: 604800  # 7 days
    bucket-seconds: 3600  # 1 hour
  event-feature-checks:
    enabled: true
    url-spam:
      hard-drop-count: 6
      short-text-drop-count: 3
      short-text-max-words: 8
    emoji:
      hard-drop-count: 20
      short-text-drop-count: 10
      short-text-max-words: 6
    repeat-char:
      hard-run-len: 12
    cashtag:
      hard-drop-count: 12
      short-text-drop-count: 6
      short-text-max-words: 12



server:
  port: 8081