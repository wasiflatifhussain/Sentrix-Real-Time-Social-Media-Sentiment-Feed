spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 10
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
    consumer:
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual

app:
  kafka:
    topic:
      raw: sentrix.ingestor.events
      cleaned: sentrix.filter-service-a.cleaned
      dropped: sentrix.filter-service-a.dropped
    consumer:
      group-id: filter-service-a
  text:
    max-len: 8000
  validation:
    min-text-len: 10
    max-event-age-days: 7
    drop-on-truncate: false  # if true, events exceeding max-text-len are dropped; if false, they are truncated


server:
  port: 8081